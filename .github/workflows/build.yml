name: Generate Clean APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto Fix and Setup Cordova
        run: |
          mkdir -p my_www_folder
          cp -r * my_www_folder/ 2>/dev/null || true
          rm -rf my_www_folder/my_www_folder my_www_folder/.github
          
          npm install -g cordova
          
          # 🚨 BADLEIN: "Musicplayer" ki jagah apna pasandida App Name likhein
          cordova create cleanapp com.pure.app "MyAppName"
          
          cd cleanapp
          rm -rf www/*
          cp -r ../my_www_folder/* www/
          
          if [ ! -f www/index.html ]; then
            echo '<html><body><h1>App Loaded</h1></body></html>' > www/index.html
          fi
          
          # Custom Logo Setup
          if [ -f ../icon.png ]; then
            cp ../icon.png www/icon.png
            sed -i '/<\/widget>/i \    <icon src="www/icon.png" \/>' config.xml
          fi
          
          cordova platform add android
          cordova build android --no-telemetry

      - name: Save APK File
        uses: actions/upload-artifact@v4
        with:
          name: Pure-Clean-APK
          path: cleanapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
